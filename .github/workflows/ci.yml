name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FrcToolsuite.slnx

      - name: Build
        run: dotnet build FrcToolsuite.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/FrcToolsuite.Core.Tests --no-build --configuration Release --verbosity normal

      - name: Check formatting
        run: dotnet format FrcToolsuite.slnx --verify-no-changes --no-restore
        if: matrix.os == 'ubuntu-latest'

  screenshots:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build FrcToolsuite.slnx --configuration Release

      - name: Capture screenshots
        run: |
          mkdir -p screenshots
          for page in Home Browse Installed Updates Settings MainWindow; do
            dotnet run --project tests/FrcToolsuite.TestHarness --configuration Release -- screenshot $page --width 1280 --height 720 --output screenshots/${page}.png || true
          done

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30
